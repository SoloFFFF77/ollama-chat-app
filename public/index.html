<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama Chat App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1a1a; color: #e0e0e0; }
        .chat-container { height: calc(100vh - 180px); }
        .message-bubble { max-width: 80%; border-radius: 12px; padding: 12px 16px; margin-bottom: 12px; }
        .user-message { background-color: #3b82f6; align-self: flex-end; }
        .ai-message { background-color: #333; align-self: flex-start; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    </style>
</head>
<body class="font-sans">
    <div class="max-w-4xl mx-auto p-4 flex flex-col h-screen">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-blue-400">🤖 Ollama Chat</h1>
            <div class="flex items-center gap-3">
                <select id="model-select" class="bg-zinc-800 text-sm border border-zinc-700 rounded-lg p-2 focus:outline-none">
                    <option value="mistral">Mistral (Default)</option>
                </select>
                <button id="refresh-models" class="p-2 hover:bg-zinc-800 rounded-full transition">🔄</button>
            </div>
        </header>

        <div id="chat-box" class="chat-container flex flex-col overflow-y-auto p-4 border border-zinc-800 rounded-xl bg-zinc-900/50 mb-4">
            <div class="ai-message message-bubble">
                Welcome! Make sure Ollama is running and you have a model downloaded. How can I help you today?
            </div>
        </div>

        <div class="relative">
            <textarea id="user-input" rows="3" placeholder="Type your message..." 
                class="w-full bg-zinc-800 border border-zinc-700 rounded-xl p-4 pr-24 focus:ring-2 focus:ring-blue-500 focus:outline-none resize-none"></textarea>
            <button id="send-btn" class="absolute right-3 bottom-3 bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-6 rounded-lg transition">
                Send
            </button>
        </div>
        
        <footer class="mt-4 text-center text-xs text-zinc-500">
            Powered by Ollama • 100% Offline • Privacy First
        </footer>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const modelSelect = document.getElementById('model-select');
        const refreshBtn = document.getElementById('refresh-models');

        async function fetchModels() {
            try {
                const res = await fetch('/api/models');
                const data = await res.json();
                if (data.models) {
                    modelSelect.innerHTML = data.models.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
                }
            } catch (err) {
                console.error('Failed to fetch models');
            }
        }

        function appendMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message-bubble ${role === 'user' ? 'user-message' : 'ai-message'}`;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            userInput.value = '';
            
            const aiMsgDiv = appendMessage('', 'ai');
            const model = modelSelect.value;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model, prompt: text })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    aiMsgDiv.textContent += decoder.decode(value);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            } catch (err) {
                aiMsgDiv.textContent = "Error: Could not connect to the server.";
                aiMsgDiv.classList.add('text-red-400');
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        refreshBtn.addEventListener('click', fetchModels);
        
        // Initial load
        fetchModels();
    </script>
</body>
</html>
